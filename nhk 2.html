        }
        /* セレクトボックス */
        select option { background-color: #1f2937; color: white; }

        /* NHK風テロップのテキスト袋文字風影効果 */

            text-shadow:

                <!-- モード切替 -->

                <div class="flex items-center gap-1 bg-gray-700/60 px-2 py-1 rounded border border-gray-600">

                        <option value="6弱">6弱</option>
                        <option value="5強">5強</option>
                        <option value="5弱">5弱</option>

                        <option value="3">3</option>
                        <option value="2">2</option>

                <div class="flex items-center gap-1.5 text-xs bg-gray-700/60 px-2 py-1 rounded border border-green-700/50 flex-grow shadow-[0_0_10px_rgba(34,197,94,0.1)]">

        function fetchP2PHistory() {
            fetch("https://api.p2pquake.net/v2/history?codes=551&limit=100")
                .then(res => res.json())
                .then(data => {
                    const select = document.getElementById('p2p-history-select');
                    select.innerHTML = '<option value="">(P2PQuakeから過去の地震を選択)</option>';
                    
                    const groups = {};
                    
                    data.forEach(item => {
                        const eqTime = item.earthquake.time;
                        if (!groups[eqTime]) {
                            groups[eqTime] = {
                                time: eqTime,
                                hypocenter: item.earthquake.hypocenter,
                                maxScale: item.earthquake.maxScale || -1,
                                areaPoints: [], 
                                cityPoints: []  
                            };
                        }
                        
                        // 最大震度更新
                        if (item.earthquake.maxScale > groups[eqTime].maxScale) {
                            groups[eqTime].maxScale = item.earthquake.maxScale;
                        }
                        
                        // 震源地情報の補完
                        if (item.earthquake.hypocenter && item.earthquake.hypocenter.name) {
                            if (!groups[eqTime].hypocenter.name) {
                                groups[eqTime].hypocenter = item.earthquake.hypocenter;
                            }
                        }

                        // 観測点(Points)の分類とマージ
                        if (item.points) {
                            item.points.forEach(p => {
                                if (p.isArea) {
                                    const existing = groups[eqTime].areaPoints.find(ap => ap.addr === p.addr);
                                    if (existing) {
                                        if (p.scale > existing.scale) existing.scale = p.scale;
                                    } else {
                                        groups[eqTime].areaPoints.push(p);
                                    }
                                } else {
                                    const existing = groups[eqTime].cityPoints.find(cp => cp.addr === p.addr);
                                    if (existing) {
                                        if (p.scale > existing.scale) existing.scale = p.scale;
                                    } else {
                                        groups[eqTime].cityPoints.push(p);
                                    }
                                }
                            });
                        }
                    });

                    // 時間順にソート
                    groupedEarthquakes = Object.values(groups).sort((a, b) => new Date(b.time) - new Date(a.time));

                    groupedEarthquakes.forEach((g, idx) => {
                        const dt = new Date(g.time);
                        const timeStr = `${dt.getMonth()+1}月${dt.getDate()}日 ${dt.getHours()}:${dt.getMinutes().toString().padStart(2,'0')}`;
                        const mag = g.hypocenter.magnitude !== -1 ? g.hypocenter.magnitude : '-';
                        const maxi = g.maxScale !== -1 ? convertP2PScale(g.maxScale) : '不明';
                        const enName = g.hypocenter.name || '海外・遠地地震';

                        const option = document.createElement('option');
                        option.value = idx; 
                        option.textContent = `【最大${maxi}】 ${timeStr} 震源:${enName} (M${mag})`;
                        select.appendChild(option);
                    });
                })
                .catch(err => {
                    console.error("P2Pリスト取得エラー", err);

        ]).then(([topoData, eqGeoJson, worldData]) => {
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 300);

            if (worldData) {
                const countries = topojson.feature(worldData, worldData.objects.countries);
                const foreignCountries = countries.features.filter(d => d.id !== "392" && d.id !== 392);
                
                foreignLayer.selectAll('path')
                    .data(foreignCountries)
                    .enter()
                    .append('path')
                    .attr('d', path)
                    .attr('fill', '#a68d79')
                    .attr('opacity', 0.95);
            }

            const geojson = topojson.feature(topoData, topoData.objects.japan);
            mapLayer.selectAll('path')
                .data(geojson.features)
                .enter()
                .append('path')
                .attr('d', path)
                .attr('fill', '#a68d79');

            if (eqGeoJson && eqGeoJson.features) {
                areaBorderLayer.selectAll('path')
                    .data(eqGeoJson.features)
                    .enter()
                    .append('path')
                    .attr('d', path)
                    .attr('fill', 'none')
                    .attr('stroke', '#715a40')
                    .attr('stroke-width', 0.6)
                    .attr('stroke-dasharray', '2, 2');

                prefBorderLayer.selectAll('path')
                    .data(geojson.features)
                    .enter()
                    .append('path')
                    .attr('d', path)
                    .attr('fill', 'none')
                    .attr('stroke', '#4a3319')
                    .attr('stroke-width', 1.5);

                eqGeoJson.features.forEach(feature => {
                    const props = feature.properties;
                    let code = props.code || props.id || props.regioncode;
                    
                    if (!code) {
                        const matched = Object.values(epicenterData).find(e => e.name === props.name);
                        if (matched) code = matched.code;
                    }

                    if (code && epicenterData[code]) {
                        epicenterData[code].feature = feature;
                        if (epicenterData[code].lon === null) {
                            const centroid = d3.geoCentroid(feature);
                            epicenterData[code].lon = centroid[0];
                            epicenterData[code].lat = centroid[1];
                        }
                    }
                });
            }

            const initialDemo = [
                { code: '762', level: '4' },
                { code: '763', level: '3' },
                { code: '760', level: '3' },
                { code: '771', level: '2' }
            ];

            initialDemo.forEach(item => {
                const ep = epicenterData[item.code];
                if (ep && ep.lon) {
                    icons.push({
                        id: Date.now() + Math.random(),
                        code: item.code,
                        lon: ep.lon,
                        lat: ep.lat,
                        level: item.level,
                        name: ep.name
                    });
                }
            });

            renderIcons();
            drawEpicenter();
            autoFitAllVisiblePoints();
        });

        // 過去地震リストの取得開始 (P2P API利用)
        fetchP2PHistory();

        // --------------------------------------------------
        // カメラ自動調整機能
        // --------------------------------------------------
        function autoFitAllVisiblePoints() {
            const coordinates = [];
            
            icons.forEach(icon => {
                if (icon.lon && icon.lat) {
                    coordinates.push([icon.lon, icon.lat]);
                }
            });

            if (epicenterLocation.visible && epicenterLocation.lon && epicenterLocation.lat) {
                coordinates.push([epicenterLocation.lon, epicenterLocation.lat]);
            }

            if (coordinates.length === 0) return;

            let minLon = Infinity, maxLon = -Infinity;
            let minLat = Infinity, maxLat = -Infinity;

            coordinates.forEach(([lon, lat]) => {
                if (lon < minLon) minLon = lon;
                if (lon > maxLon) maxLon = lon;
                if (lat < minLat) minLat = lat;
                if (lat > maxLat) maxLat = lat;
            });

            const centerLon = (minLon + maxLon) / 2;
            const centerLat = (minLat + maxLat) / 2;

            const pMin = projection([minLon, maxLat]);
            const pMax = projection([maxLon, minLat]);

            if (!pMin || !pMax) return;

            const dx = Math.abs(pMax[0] - pMin[0]);
            const dy = Math.abs(pMax[1] - pMin[1]);

            const padding = 120;
            const wLimit = width - padding * 2;
            const hLimit = height - padding * 2;

            let autoScale = 1;
            if (dx > 0 || dy > 0) {
                autoScale = Math.min(wLimit / dx, hLimit / dy);
            }
            
            autoScale = Math.max(0.1, Math.min(autoScale, 20));

            const centerProjected = projection([centerLon, centerLat]);
            if (!centerProjected) return;

            const tx = width / 2 - autoScale * centerProjected[0];
            const ty = height / 2 - autoScale * centerProjected[1];

            const instantTransform = d3.zoomIdentity.translate(tx, ty).scale(autoScale);
            currentTransform = instantTransform;
            svg.call(zoom.transform, instantTransform);
        }

        // --------------------------------------------------
        // インタラクションと描画ロジック
        // --------------------------------------------------
        svg.on('click', (event) => {
            if (event.defaultPrevented) return;

            const [x, y] = d3.pointer(event);
            const invertedPoint = currentTransform.invert([x, y]);
            const [lon, lat] = projection.invert(invertedPoint);

            if (activeMode === 'epicenter') {
                epicenterLocation.lon = lon;
                epicenterLocation.lat = lat;
                epicenterLocation.visible = true;
                drawEpicenter();
                autoFitAllVisiblePoints();
            } else {
                let targetCode = null;
                let minDistance = Infinity;

                for (const code in epicenterData) {
                    const ep = epicenterData[code];
                    if (!ep.lon || !ep.lat) continue;

                    if (ep.feature && d3.geoContains(ep.feature, [lon, lat])) {
                        targetCode = code;
                        break;
                    }

                    const dist = d3.geoDistance([lon, lat], [ep.lon, ep.lat]);
                    if (dist < minDistance) {
                        minDistance = dist;
                        targetCode = code;
                    }
                }

                if (targetCode && epicenterData[targetCode].lon) {
                    const ep = epicenterData[targetCode];
                    icons = icons.filter(icon => icon.code !== targetCode);
                    
                    icons.push({
                        id: Date.now(),
                        code: targetCode,
                        lon: ep.lon,
                        lat: ep.lat,
                        level: currentSelectedLevel,
                        name: ep.name
                    });

                    regionSelect.value = targetCode;
                } else {
                    icons.push({
                        id: Date.now(),
                        code: null,
                        lon: lon,
                        lat: lat,
                        level: currentSelectedLevel,
                        name: "不明地域"
                    });
                }
                renderIcons();
                autoFitAllVisiblePoints();
            }
        });

        document.getElementById('btn-add-region').addEventListener('click', () => {
            const code = regionSelect.value;
            if (!code) return;

            const ep = epicenterData[code];
            if (ep && ep.lon && ep.lat) {
                icons = icons.filter(icon => icon.code !== code);
                icons.push({
                    id: Date.now(),
                    code: code,
                    lon: ep.lon,
                    lat: ep.lat,
                    level: currentSelectedLevel,
                    name: ep.name
                });
                renderIcons();
                autoFitAllVisiblePoints();
            }
        });

        function renderIcons() {
            icons.sort((a, b) => {
                const wA = shindoLevels.find(l => l.id === a.level)?.weight || 0;
                const wB = shindoLevels.find(l => l.id === b.level)?.weight || 0;
                return wA - wB; 
            });

            const iconGroups = iconLayer.selectAll('g.shindo-icon')
                .data(icons, d => d.id);

            const enter = iconGroups.enter()
                .append('g')
                .attr('class', 'shindo-icon')
                .style('cursor', 'pointer')
                .on('click', (event, d) => {
                    event.stopPropagation();
                    icons = icons.filter(icon => icon.id !== d.id);
                    renderIcons();
                    autoFitAllVisiblePoints();
                });

            enter.append('title')
                .text(d => d.name ? `${d.name} (震度 ${d.level})` : `震度 ${d.level}`);

            enter.append('rect')
                .attr('x', -14)
                .attr('y', -14)
                .attr('width', 28)
                .attr('height', 28)
                .attr('stroke', d => d.level === '7' ? '#FFFF00' : 'none')
                .attr('stroke-width', d => d.level === '7' ? 2 : 0)
                .attr('fill', d => {
                    const level = shindoLevels.find(l => l.id === d.level);
                    return level ? level.bg : '#FFF';
                });

            enter.append('text')
                .attr('text-anchor', 'middle')
                .attr('dominant-baseline', 'central')
                .attr('font-family', '"Helvetica Neue", Arial, sans-serif')
                .attr('font-weight', '900')
                .attr('stroke', 'none')
                .attr('fill', d => {
                    const level = shindoLevels.find(l => l.id === d.level);
                    return level ? level.fg : '#000';
                })
                .attr('font-size', d => {
                    return d.level.length > 1 ? '10px' : '18px';
                })
                .attr('letter-spacing', d => {
                    return d.level.length > 1 ? '-1px' : '0px';
                })
                .attr('dy', '0.05em')
                .text(d => {
                    const level = shindoLevels.find(l => l.id === d.level);
                    return level ? level.label : '';
                });

            iconGroups.exit().remove();
            
            iconLayer.selectAll('g.shindo-icon').order();
            updateIconPositions();
        }

        function updateIconPositions() {
            iconLayer.selectAll('g.shindo-icon')
                .attr('transform', d => {
                    const projected = projection([d.lon, d.lat]);
                    if (!projected) return `translate(-2000, -2000)`;
                    const [x, y] = projected;
                    const tx = currentTransform.applyX(x);
                    const ty = currentTransform.applyY(y);
                    return `translate(${tx}, ${ty})`;
                });
        }

        function drawEpicenter() {
            epicenterLayer.selectAll('*').remove();
            if (!epicenterLocation.visible) return;

            const dragHandler = d3.drag()
                .on('drag', (event) => {
                    const [x, y] = d3.pointer(event, svg.node());
                    const invertedPoint = currentTransform.invert([x, y]);
                    const [lon, lat] = projection.invert(invertedPoint);
                    epicenterLocation.lon = lon;
                    epicenterLocation.lat = lat;
                    updateEpicenterPosition();
                })
                .on('end', () => {
                     autoFitAllVisiblePoints();
                });

            const epiGroup = epicenterLayer.append('g')
                .attr('id', 'epicenter-mark')
                .style('cursor', 'move')
                .call(dragHandler);

            const outerPath = "M -4,-20 L 4,-20 L 4,-4 L 20,-4 L 20,4 L 4,4 L 4,20 L -4,20 L -4,4 L -20,4 L -20,-4 L -4,-4 Z";
            epiGroup.append('path')
                .attr('d', outerPath)
                .attr('transform', 'rotate(45)')
                .attr('fill', '#FFFF00');

            const innerPath = "M -2.5,-17.5 L 2.5,-17.5 L 2.5,-2.5 L 17.5,-2.5 L 17.5,2.5 L 2.5,2.5 L 2.5,17.5 L -2.5,17.5 L -2.5,2.5 L -17.5,2.5 L -17.5,-2.5 L -2.5,-2.5 Z";
            epiGroup.append('path')
                .attr('d', innerPath)
                .attr('transform', 'rotate(45)')
                .attr('fill', '#C80000');

            updateEpicenterPosition();
        }

        function updateEpicenterPosition() {
            const projected = projection([epicenterLocation.lon, epicenterLocation.lat]);
            if (!projected) return;
            const [x, y] = projected;
            const tx = currentTransform.applyX(x);
            const ty = currentTransform.applyY(y);
            epicenterLayer.select('#epicenter-mark')
                .attr('transform', `translate(${tx}, ${ty})`);
        }

        window.addEventListener('resize', () => {
            width = container.clientWidth;
            height = container.clientHeight;
            
            svg.attr('width', width).attr('height', height);
            projection.translate([width / 2.3, height / 1.7]);

            foreignLayer.selectAll('path').attr('d', path);
            mapLayer.selectAll('path').attr('d', path);
            areaBorderLayer.selectAll('path').attr('d', path);
            prefBorderLayer.selectAll('path').attr('d', path);
            
            updateIconPositions();
            updateEpicenterPosition();
        });

        document.getElementById('btn-reset-zoom').addEventListener('click', () => {
            currentTransform = d3.zoomIdentity;
            svg.call(zoom.transform, d3.zoomIdentity);
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            icons = [];
            renderIcons();
            epicenterLocation.visible = false;
            drawEpicenter();
        });

        document.getElementById('btn-download').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#264ed1';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const svgElement = document.getElementById('map-svg');
            const serializer = new XMLSerializer();
            let svgString = serializer.serializeToString(svgElement);
            
            if (!svgString.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)) {
                svgString = svgString.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
            }

            const img = new Image();
            const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);
            
            img.onload = () => {
                ctx.drawImage(img, 0, 0);

                const headerX = 24;
                const headerY = 16;
                const maxBoxWidth = 100;
                const barHeight = 44;
                
                const maxLevelObj = shindoLevels.find(l => l.id === selectMaxShindo.value);
                const maxBg = maxLevelObj ? maxLevelObj.bg : '#ff8c1a';
                const maxFg = maxLevelObj ? maxLevelObj.fg : '#000000';

                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 8;
                ctx.fillStyle = maxBg;
                ctx.fillRect(headerX, headerY, maxBoxWidth, barHeight);

                const infoGrad = ctx.createLinearGradient(headerX + maxBoxWidth, headerY, headerX + maxBoxWidth, headerY + barHeight);
                infoGrad.addColorStop(0, '#5c7bb5');
                infoGrad.addColorStop(1, '#3a548c');
                ctx.fillStyle = infoGrad;
                
                const infoText = `${inputTime.value}   M${inputMag.value}`;
                ctx.font = 'bold 16px sans-serif';
                const textWidth = ctx.measureText(infoText).width;
                const barWidth = textWidth + 60;
                ctx.fillRect(headerX + maxBoxWidth, headerY, barWidth, barHeight);

                if (selectMaxShindo.value === '7') {
                    ctx.strokeStyle = '#FFFF00';
                    ctx.lineWidth = 3.5;
                } else {
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2.5;
                }
                ctx.strokeRect(headerX, headerY, maxBoxWidth, barHeight);
                
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2.5;
                ctx.strokeRect(headerX + maxBoxWidth, headerY, barWidth, barHeight);

                ctx.shadowBlur = 0; 

                ctx.fillStyle = maxFg;
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('最大震度', headerX + maxBoxWidth / 2, headerY + 14);

                ctx.font = '900 24px "Helvetica Neue", Arial, sans-serif';
                if (selectMaxShindo.value.length > 1) {
                    ctx.font = '900 16px "Helvetica Neue", Arial, sans-serif';
                    ctx.fillText(selectMaxShindo.value, headerX + maxBoxWidth / 2, headerY + 33);
                } else {
                    ctx.fillText(selectMaxShindo.value, headerX + maxBoxWidth / 2, headerY + 36);
                }

                ctx.textAlign = 'left';
                ctx.font = 'bold 16px "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif';
                
                const drawOutlineText = (txt, tx, ty, fill, stroke) => {
                    ctx.strokeStyle = stroke;
                    ctx.lineWidth = 3.5;
                    ctx.strokeText(txt, tx, ty);
                    ctx.fillStyle = fill;
                    ctx.fillText(txt, tx, ty);
                };

                const timeText = inputTime.value;
                ctx.fillStyle = '#ffffff';
                ctx.fillText(timeText, headerX + maxBoxWidth + 20, headerY + 28);

                const magText = `M${inputMag.value}`;
                const timeWidth = ctx.measureText(timeText).width;
                ctx.fillStyle = '#ffff00';
                ctx.fillText(magText, headerX + maxBoxWidth + 20 + timeWidth + 20, headerY + 28);

                const townLines = inputTowns.value.split('\n');
                if (townLines.length > 0 && townLines[0].trim() !== '') {
                    const townY = 80;
                    const townX = 24;
                    const townLineHeight = 24;
                    const townPad = 8;
                    const townBoxHeight = (townLines.length * townLineHeight) + (townPad * 2);
                    const townBoxWidth = 150;

                    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                    ctx.fillRect(townX, townY, townBoxWidth, townBoxHeight);

                    ctx.fillStyle = '#ff8c1a';
                    ctx.fillRect(townX, townY, 4, townBoxHeight);

                    ctx.font = 'bold 14px "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif';
                    ctx.textAlign = 'left';
                    townLines.forEach((line, index) => {
                        drawOutlineText(line.trim(), townX + 12, townY + townPad + 16 + (index * townLineHeight), '#ffffff', '#000000');
                    });
                }

                const legW = 100;
                const legH = 210;
                const legX = width - legW - 20;
                const legY = height - legH - 20;

                ctx.fillStyle = 'rgba(15, 30, 50, 0.8)';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.fillRect(legX, legY, legW, legH);
                ctx.strokeRect(legX, legY, legW, legH);

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('震度凡例', legX + legW / 2, legY + 16);

                shindoLevels.forEach((level, index) => {
                    const ly = legY + 30 + (index * 19);
                    
                    ctx.fillStyle = level.bg;
                    ctx.fillRect(legX + 10, ly, 24, 14);
                    if (level.id === '7') {
                        ctx.strokeStyle = '#FFFF00';
                        ctx.lineWidth = 1.5;
                    } else {
                        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                        ctx.lineWidth = 0.5;
                    }
                    ctx.strokeRect(legX + 10, ly, 24, 14);

                    ctx.fillStyle = level.fg;
                    ctx.font = 'bold 9px sans-serif';
                    ctx.fillText(level.label, legX + 22, ly + 11);

                    ctx.fillStyle = '#cccccc';
                    ctx.font = '9px sans-serif';
                    ctx.textAlign = 'left';
                    ctx.fillText(`震度 ${level.id}`, legX + 38, ly + 11);
                    ctx.textAlign = 'center';
                });

                const pngUrl = canvas.toDataURL('image/png');
                const downloadLink = document.createElement('a');
                downloadLink.href = pngUrl;
                downloadLink.download = `NHK_shindo_${Date.now()}.png`;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                URL.revokeObjectURL(url);
            };
            img.src = url;
        });

    </script>
</body>
</html>
